name: Sync main to gh-pages

# GitHub Pages ของ repo นี้เสิร์ฟจาก branch gh-pages (โหมด branch ไม่ใช่ Actions artifact)
# workflow นี้ทำให้ push main แล้วเว็บอัปเดตเอง ไม่ต้อง push main:gh-pages ด้วยมือ
# พร้อมประทับเลข commit ลงหน้าเว็บและท้าย URL ของ script/style เพื่อกัน cache ค้าง

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-gh-pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp build version and deploy
        run: |
          set -euo pipefail

          SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(TZ=Asia/Bangkok date '+%Y-%m-%d %H:%M น.')"
          echo "Deploying ${SHA} (${BUILD_DATE})"

          sed -i \
            -e "s|script\.js?v=[^\"]*|script.js?v=${SHA}|g" \
            -e "s|styles\.css?v=[^\"]*|styles.css?v=${SHA}|g" \
            -e "s|<meta name=\"build-version\" content=\"[^\"]*\"|<meta name=\"build-version\" content=\"${SHA}\"|" \
            -e "s|<meta name=\"build-date\" content=\"[^\"]*\"|<meta name=\"build-date\" content=\"${BUILD_DATE}\"|" \
            index.html

          # ถ้า sed ไม่เจอที่ให้แทน แปลว่า index.html เปลี่ยนโครงจนหลุด ล้มไปเลยดีกว่า deploy ของผิด
          grep -q "name=\"build-version\" content=\"${SHA}\"" index.html
          grep -q "script.js?v=${SHA}" index.html
          grep -q "styles.css?v=${SHA}" index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --detach
          git add -A
          git commit -m "Deploy ${SHA}"
          git push --force origin HEAD:gh-pages
