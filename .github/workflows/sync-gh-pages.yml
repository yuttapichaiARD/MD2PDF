name: Sync main to gh-pages

# GitHub Pages ของ repo นี้เสิร์ฟจาก branch gh-pages (โหมด branch ไม่ใช่ Actions artifact)
# workflow นี้ทำให้ push main แล้วเว็บอัปเดตเอง ไม่ต้อง push main:gh-pages ด้วยมือ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-gh-pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to gh-pages
        run: git push origin HEAD:gh-pages
